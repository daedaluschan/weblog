site_name: My AI Journal
site_description: A personal blog of all the bits and bites throughout my AI self-learning journey
site_author: Daedalus (DD)
site_url: https://daedaluschan.github.io/weblog/
repo_url: https://github.com/daedaluschan/weblog
repo_name: daedaluschan/weblog

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - blog:
      blog_dir: blog
      post_dir: "{blog}/posts"
      post_url_format: "{date}/{slug}"
      post_date_format: long
      post_excerpt: required
      post_readtime: true
      pagination: true
      pagination_per_page: 5
      archive: true
      archive_name: Archive
      archive_date_format: MMMM yyyy
      archive_url_date_format: yyyy/MM
      categories: true
      categories_name: Categories
  # Do not add `tags_file`; Material for MkDocs now discovers
  # `<!-- material/tags -->` in docs/tags.md automatically, and
  # `mkdocs build --strict` fails if deprecated options warn.
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Blog:
      - Blog Home: blog/index.md
      - Starting My AI Journal: https://daedaluschan.github.io/weblog/blog/2026/06/02/starting-my-ai-journal/
      - What I Learnt About GitHub Actions When Building My MkDocs Blog: https://daedaluschan.github.io/weblog/blog/2026/06/04/what-i-learnt-about-github-actions-when-building-my-mkdocs-blog/
      - Hiring in the Age of AI Noise: https://daedaluschan.github.io/weblog/blog/2026/06/16/hiring-in-the-age-of-ai-noise/
  - Tags: tags.md
